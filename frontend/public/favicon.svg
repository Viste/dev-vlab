<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <g transform="translate(32,32)">
    <!-- V как серп: левая линия изогнута -->
    <path d="M-14,-18 C-12,-8 -4,8 0,20" stroke="#a855f7" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- V правая линия прямая как молот -->
    <path d="M14,-18 L0,20" stroke="#a855f7" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Молоток наверху правой линии -->
    <rect x="8" y="-22" width="12" height="5" rx="1.5" fill="#a855f7"/>
    <!-- Звезда маленькая -->
    <polygon points="0,-24 1.5,-20.5 5,-20.5 2.5,-18 3.5,-14.5 0,-16.5 -3.5,-14.5 -2.5,-18 -5,-20.5 -1.5,-20.5" fill="#ef4444" opacity="0.9"/>
  </g>
</svg>
